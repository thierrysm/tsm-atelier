services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=atelier_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  minio:
    image: minio/minio
    container_name: atelier-minio
    environment:
      MINIO_ROOT_USER: atelier
      MINIO_ROOT_PASSWORD: atelier123
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console web
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: