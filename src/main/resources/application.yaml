app:
  features:
    email-verification:
      enabled: ${EMAIL_VERIFICATION_ENABLED:false}

spring:
  application:
    name: Atelier
    email-verification-expiration: ${EMAIL_VERIFICATION_EXPIRATION:14400}
    verification-base-url: ${VERIFICATION_BASE_URL}
    verification-subject: ${VERIFICATION_SUBJECT:Confirme seu e-mail}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/atelier_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    throw-exception-if-no-handler-found: true
    web:
      resources:
        add-mappings: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: ${ACCESS_TOKEN_EXPIRATION:900}      # 15 min em segundos
      refresh-token-expiration: ${REFRESH_TOKEN_EXPIRATION:604800} # 7 dias em segundos
      issuer: ${JWT_ISSUER:atelier-api}
      audience: ${JWT_AUDIENCE:atelier-web}
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  resend:
    api-key: ${RESEND_API_KEY}
    from: ${RESEND_FROM}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY}
      secret-key: ${MINIO_SECRET_KEY}
      bucket: ${MINIO_BUCKET:atelier}
      base-url: ${MINIO_BASE_URL:http://localhost:9000/atelier}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  info:
    java:
      enabled: true
    os:
      enabled: true

payment:
  stripe:
    api-key: ${STRIPE_API_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/checkout/success?session_id={CHECKOUT_SESSION_ID}}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/checkout/cancel}