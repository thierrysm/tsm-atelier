spring:
  application:
    name: Atelier
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mvc:
    throw-exception-if-no-handler-found: true
    web:
      resources:
        add-mappings: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB