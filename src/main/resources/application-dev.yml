spring:
  application:
    name: Atelier
  datasource:
    url: jdbc:postgresql://localhost:5432/atelier_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: atelier
      secret-key: atelier123
      bucket: atelier
      base-url: http://localhost:9000/atelier
