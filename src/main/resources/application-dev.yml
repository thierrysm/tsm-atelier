spring:
  jpa:
    show-sql: true
  application:
    verification-base-url: ${VERIFICATION_BASE_URL:http://localhost:3000/auth/verify}
  datasource:
    password: ${DB_PASSWORD:1234}
  flyway:
    clean-on-validation-error: false
  security:
    jwt:
      # Gerado apenas para dev
      secret: ${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWtleS1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbi0xMjM0NQ==}
  resend:
    api-key: ${RESEND_API_KEY:re_dev_placeholder}
    from: ${RESEND_FROM:Atelier <onboarding@resend.dev>}
  storage:
    minio:
      access-key: ${MINIO_ACCESS_KEY:atelier}
      secret-key: ${MINIO_SECRET_KEY:atelier123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  allowed-origins:
    "http://localhost:3000"
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  info:
    java:
      enabled: true
    os:
      enabled: true

payment:
  stripe:
    api-key: ${STRIPE_API_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dev_placeholder}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:3000/checkout/success?session_id={CHECKOUT_SESSION_ID}}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:3000/checkout/cancel}
