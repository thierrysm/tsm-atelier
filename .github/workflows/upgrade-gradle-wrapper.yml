name: Upgrade Gradle wrapper
on:
  schedule:
    - cron: "0 3 * * MON"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  upgrade-gradle-wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup JDK
        uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      - name: Get current Gradle version
        run: |
          VERSION=$(./gradlew --version --no-daemon | grep '^Gradle ' | cut -d' ' -f2)
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Upgrade Gradle wrapper (first run)
        run: ./gradlew wrapper --gradle-version latest --no-daemon
      - name: Upgrade Gradle wrapper (second run to force file updates)
        run: ./gradlew wrapper --gradle-version latest --no-daemon
      - name: Get latest Gradle version
        run: |
          VERSION=$(./gradlew --version --no-daemon | grep '^Gradle ' | cut -d' ' -f2)
          echo "LATEST_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Check for existing PRs and close outdated ones
        id: list_prs
        uses: actions/github-script@v9
        with:
          script: |
            function parseVersion(version) {
                const parts = version.split('.').map(n => parseInt(n, 10));
                return { major: parts[0] || 0, minor: parts[1] || 0, patch: parts[2] || 0 };
            }

            function isOlder(versionA, versionB) {
                const a = parseVersion(versionA);
                const b = parseVersion(versionB);
                if (a.major !== b.major) return a.major < b.major;
                if (a.minor !== b.minor) return a.minor < b.minor;
                return a.patch < b.patch;
            }

            const latestVersion = process.env.LATEST_VERSION;
            const pullRequests = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
            });
            let foundLatestVersion = false;
            for (const pullRequest of pullRequests.data) {
                const match = pullRequest.title.match(/Upgrade Gradle wrapper from ([\d.]+) to ([\d.]+)/);
                if (match) {
                    const toVersion = match[2];
                    if (toVersion === latestVersion) {
                        foundLatestVersion = true;
                        continue;
                    }
                    if (isOlder(toVersion, latestVersion)) {
                        console.log(`Closing outdated PR: ${pullRequest.title}`);
                        await github.rest.issues.createComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: pullRequest.number,
                            body: `Closing this PR because a newer Gradle version (${latestVersion}) is available.`
                        });
                        await github.rest.pulls.update({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            pull_number: pullRequest.number,
                            state: "closed"
                        });
                    }
                }
            }
            core.setOutput("pr_exists", foundLatestVersion ? "true" : "false");
      - name: Set timestamp-based branch name
        run: echo "BRANCH_NAME=build/upgrade-gradle-wrapper-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
      - name: Create pull request
        if: steps.list_prs.outputs.pr_exists == 'false'
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          commit-message: 'build: upgrade Gradle wrapper to ${{ env.LATEST_VERSION }}'
          title: Upgrade Gradle wrapper from ${{ env.CURRENT_VERSION }} to ${{ env.LATEST_VERSION }}
          body: |
            Auto-generated by [upgrade-gradle-wrapper.yml][1]